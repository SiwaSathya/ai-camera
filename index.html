<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fit - Gemini 3.1 Image Generation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gray-panel { background-color: #1c1c1c; border: 1px solid #333; }
        .input-field { background: #262626; border: 1px solid #444; color: white; border-radius: 8px; padding: 12px; }
        #video-canvas, #result-image { border-radius: 12px; background: #000; width: 100%; max-width: 450px; border: 2px solid #444; }
        #video-canvas { transform: scaleX(-1); }
        .btn-primary { background-color: #3f3f46; transition: 0.3s; cursor: pointer; border: 1px solid #52525b; }
        .btn-primary:hover { background-color: #52525b; }
        .loader { border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <div class="max-w-6xl w-full">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold text-white tracking-tighter uppercase">AI Visual Transformer 3.1</h1>
            <p class="text-zinc-500 font-mono text-xs mt-2">Mode: Image Generation Enabled</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="gray-panel p-8 rounded-3xl shadow-2xl space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="weight" placeholder="Berat (kg)" class="input-field w-full outline-none">
                    <input type="number" id="height" placeholder="Tinggi (cm)" class="input-field w-full outline-none">
                </div>

                <input type="file" id="cloth-input" accept="image/*" class="hidden">
                <button onclick="document.getElementById('cloth-input').click()" class="w-full py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-sm hover:bg-zinc-700 transition font-bold uppercase">Upload Pakaian</button>

                <div class="relative">
                    <video id="webcam" autoplay playsinline class="hidden"></video>
                    <canvas id="video-canvas"></canvas>
                    <div id="freeze-overlay" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center rounded-xl">
                        <span class="text-white font-bold text-xs tracking-widest border border-white p-2">CAPTURED</span>
                    </div>
                </div>

                <button id="capture-btn" class="btn-primary w-full py-4 rounded-2xl font-bold text-white shadow-xl tracking-widest text-sm uppercase">PROSES & GENERATE GAMBAR</button>
                <center><div class="loader" id="loader"></div></center>
                <button id="reset-btn" class="hidden w-full text-[10px] text-zinc-500 hover:text-white transition underline mt-2 uppercase">Ambil Ulang Foto</button>
            </div>

            <div class="gray-panel p-8 rounded-3xl shadow-2xl flex flex-col items-center">
                <h2 class="text-zinc-500 text-xs font-bold uppercase mb-6 tracking-widest border-b border-zinc-800 pb-3 w-full">Generated Output</h2>
                
                <div id="image-container" class="w-full flex flex-col items-center justify-center min-h-[350px] bg-black/40 rounded-2xl border border-zinc-800/50 p-4">
                    <img id="result-image" class="hidden shadow-2xl" alt="AI Generated Result">
                    <div id="placeholder-text" class="text-zinc-600 text-sm italic">Hasil gambar akan muncul di sini...</div>
                </div>

                <div id="ai-status-box" class="mt-6 w-full p-4 bg-zinc-900/50 rounded-xl border border-zinc-800 hidden">
                    <p id="ai-description" class="text-xs text-zinc-400 leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBL6s9TRBpKOyCJHgnAmis-dbCln_KABcw"; 
        const MODEL_ID = "gemini-3.1-flash-image-preview";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${API_KEY}`;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resultImage = document.getElementById('result-image');
        const placeholderText = document.getElementById('placeholder-text');
        const aiDescription = document.getElementById('ai-description');
        const aiStatusBox = document.getElementById('ai-status-box');
        const loader = document.getElementById('loader');

        let stream = null;
        let clothBase64 = "";
        let isFrozen = false;
        let animationId = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                isFrozen = false;
                resetBtn.classList.add('hidden');
                document.getElementById('freeze-overlay').classList.add('hidden');
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    draw();
                };
            } catch (e) { alert("Kamera error."); }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                cancelAnimationFrame(animationId);
                isFrozen = true;
                document.getElementById('freeze-overlay').classList.remove('hidden');
                resetBtn.classList.remove('hidden');
            }
        }

        function draw() {
            if (!isFrozen) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                animationId = requestAnimationFrame(draw);
            }
        }

        document.getElementById('cloth-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => { clothBase64 = reader.result.split(',')[1]; };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function processAI() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value;
            if(!w || !h || !clothBase64) return alert("Lengkapi data!");

            const selfieBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            stopCamera();

            loader.style.display = "block";
            captureBtn.disabled = true;
            placeholderText.innerText = "Generating pixels... Mohon tunggu.";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `GENERATE_IMAGE: Virtual Try-On. Person in Image 1 wearing clothing from Image 2. User Physique: ${w}kg, ${h}cm. STRICT: Keep face identical. Output must be a new image showing the person wearing the target clothing.` },
                                { inline_data: { mime_type: "image/jpeg", data: selfieBase64 } },
                                { inline_data: { mime_type: "image/jpeg", data: clothBase64 } }
                            ]
                        }],
                        generationConfig: {
                            // Menambahkan konfigurasi agar AI tahu kita mengekspektasikan image output
                            response_mime_type: "application/json" 
                        }
                    })
                });

                const data = await response.json();

                // LOGIKA MENANGKAP GAMBAR DARI RESPONSE
                const parts = data.candidates[0].content.parts;
                let foundImage = false;

                parts.forEach(part => {
                    if (part.inline_data) {
                        // Jika AI mengembalikan gambar (Base64)
                        resultImage.src = `data:${part.inline_data.mime_type};base64,${part.inline_data.data}`;
                        resultImage.classList.remove('hidden');
                        placeholderText.classList.add('hidden');
                        foundImage = true;
                    } else if (part.text) {
                        // Jika ada deskripsi teks tambahan
                        aiStatusBox.classList.remove('hidden');
                        aiDescription.innerText = part.text;
                    }
                });

                if (!foundImage) {
                    placeholderText.innerText = "AI tidak mengembalikan gambar. Coba ganti foto.";
                }

            } catch (err) {
                console.error(err);
                placeholderText.innerText = "Error: " + err.message;
            } finally {
                loader.style.display = "none";
                captureBtn.disabled = false;
            }
        }

        resetBtn.onclick = startCamera;
        captureBtn.onclick = processAI;
        startCamera();
    </script>
</body>
</html>
