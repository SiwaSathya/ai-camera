<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Try-On - Final Verified</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Inter', sans-serif; }
        .gray-panel { background-color: #1e1e1e; border: 1px solid #333; }
        .input-field { background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; padding: 10px; }
        #video-canvas { border-radius: 12px; background: #000; width: 100%; max-width: 450px; transform: scaleX(-1); border: 2px solid #444; }
        .btn-primary { background-color: #444; transition: 0.3s; }
        .btn-primary:hover { background-color: #666; }
        .loader { border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #cloth-preview { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; display: none; margin: 10px auto; border: 1px solid #555; }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <div class="max-w-5xl w-full">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-100">AI Visual Transformer</h1>
            <p class="text-gray-400">Standard API Documentation Version (v1beta)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="gray-panel p-6 rounded-2xl shadow-xl space-y-5">
                <div>
                    <label class="block text-sm text-gray-400 mb-2 font-semibold">Data Fisik</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="weight" placeholder="Berat (kg)" class="input-field w-full">
                        <input type="number" id="height" placeholder="Tinggi (cm)" class="input-field w-full">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2 font-semibold">Foto Baju Pilihan</label>
                    <input type="file" id="cloth-input" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('cloth-input').click()" class="w-full py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm hover:bg-zinc-700">Pilih File Gambar</button>
                    <img id="cloth-preview">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2 font-semibold">Selfie Camera</label>
                    <video id="webcam" autoplay playsinline class="hidden"></video>
                    <canvas id="video-canvas"></canvas>
                </div>

                <button id="capture-btn" class="btn-primary w-full py-3 rounded-xl font-bold text-white shadow-lg uppercase tracking-wider">Mulai Proses</button>
                
                <div class="flex flex-col items-center gap-2">
                    <div class="loader" id="loader"></div>
                    <span id="status-info" class="text-xs text-gray-500"></span>
                </div>
            </div>

            <div class="gray-panel p-6 rounded-2xl shadow-xl flex flex-col">
                <h2 class="text-gray-400 text-xs font-bold uppercase mb-4 border-b border-zinc-800 pb-2">AI Results</h2>
                <div class="flex-grow overflow-y-auto">
                    <div id="ai-result-text" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">
                        Menunggu input data dan foto...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Kunci keberhasilan: Endpoint v1beta sesuai dokumentasi terbaru
        const API_KEY = "AIzaSyBL6s9TRBpKOyCJHgnAmis-dbCln_KABcw"; 
        const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('video-canvas');
        const clothInput = document.getElementById('cloth-input');
        const clothPreview = document.getElementById('cloth-preview');
        const captureBtn = document.getElementById('capture-btn');
        const loader = document.getElementById('loader');
        const aiResultText = document.getElementById('ai-result-text');
        const statusInfo = document.getElementById('status-info');
        const ctx = canvas.getContext('2d');

        let clothBase64 = "";

        // Akses Webcam
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    renderVideo();
                };
            } catch (err) {
                statusInfo.innerText = "Error: Kamera tidak bisa diakses.";
            }
        }

        function renderVideo() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderVideo);
        }

        // Handle Upload Baju
        clothInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                clothBase64 = reader.result.split(',')[1];
                clothPreview.src = reader.result;
                clothPreview.style.display = "block";
            };
            reader.readAsDataURL(file);
        });

        async function processAI() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value;

            if(!w || !h || !clothBase64) {
                alert("Lengkapi berat, tinggi, dan foto baju!");
                return;
            }

            loader.style.display = "block";
            captureBtn.disabled = true;
            statusInfo.innerText = "Mengirim data ke Google Server...";
            aiResultText.innerText = "AI sedang berpikir...";

            try {
                const selfieBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                // Request Body sesuai spesifikasi Gemini API Multimodal
                const payload = {
                    contents: [{
                        parts: [
                            { text: `System Message: Anda adalah AI Fashion Consultant. 
                            Tugas: Analisis foto orang (Selfie) dan foto baju yang dilampirkan. 
                            Visualisasikan (secara tekstual) bagaimana baju tersebut terlihat di tubuh user dengan tinggi ${h}cm dan berat ${w}kg. 
                            PENTING: Pastikan wajah tidak berubah sama sekali.` },
                            { inline_data: { mime_type: "image/jpeg", data: selfieBase64 } },
                            { inline_data: { mime_type: "image/jpeg", data: clothBase64 } }
                        ]
                    }],
                    generationConfig: {
                        temperature: 0.4,
                        topP: 0.8,
                        topK: 40
                    }
                };

                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                // Parsing hasil dari struktur response Google
                const output = data.candidates[0].content.parts[0].text;
                aiResultText.innerText = output;
                statusInfo.innerText = "Berhasil.";

            } catch (err) {
                console.error("Detail Error:", err);
                aiResultText.innerHTML = `<span class="text-red-500 font-mono">ERROR: ${err.message}</span>`;
                statusInfo.innerText = "Gagal.";
            } finally {
                loader.style.display = "none";
                captureBtn.disabled = false;
            }
        }

        captureBtn.onclick = processAI;
        initCamera();
    </script>
</body>
</html>
