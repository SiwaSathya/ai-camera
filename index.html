<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fashion Transformer v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .gray-panel { background-color: #161616; border: 1px solid #2a2a2a; border-radius: 2rem; }
        #video-canvas, #result-image { border-radius: 1.5rem; width: 100%; max-width: 480px; background: #000; border: 1px solid #333; }
        #video-canvas { transform: scaleX(-1); }
        .loader { border: 3px solid #222; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-10 flex flex-col items-center">

    <div class="max-w-5xl w-full">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Fashion Transformer v3.1</h1>
            <p class="text-zinc-500 text-[10px] font-mono mt-1 italic">PROTOTYPE: IMAGE-TO-IMAGE GENERATION</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="gray-panel p-6 shadow-2xl space-y-6">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="weight" placeholder="Berat (kg)" class="bg-[#1f1f1f] p-3 rounded-xl outline-none text-sm border border-zinc-800">
                    <input type="number" id="height" placeholder="Tinggi (cm)" class="bg-[#1f1f1f] p-3 rounded-xl outline-none text-sm border border-zinc-800">
                </div>

                <div class="space-y-2">
                    <input type="file" id="cloth-input" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('cloth-input').click()" class="w-full py-3 bg-zinc-900 border border-zinc-700 rounded-xl text-[11px] font-bold uppercase hover:bg-zinc-800 transition">Pilih Gambar Baju</button>
                    <div id="file-status" class="text-[10px] text-center text-zinc-500 italic">No file selected</div>
                </div>

                <div class="relative">
                    <video id="webcam" autoplay playsinline class="hidden"></video>
                    <canvas id="video-canvas"></canvas>
                    <div id="freeze-overlay" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center rounded-[1.5rem]">
                        <span class="border-2 border-white px-4 py-2 text-[10px] font-black uppercase tracking-[0.3em]">Captured</span>
                    </div>
                </div>

                <button id="capture-btn" class="w-full py-4 bg-white text-black rounded-2xl font-black uppercase tracking-widest text-sm hover:bg-zinc-300 transition shadow-xl">Generate Look</button>
                <div class="flex flex-col items-center gap-3">
                    <div class="loader" id="loader"></div>
                    <div id="status-info" class="text-[10px] text-zinc-600 font-mono uppercase tracking-widest text-center">System Ready</div>
                </div>
                <button id="reset-btn" class="hidden w-full text-[10px] text-zinc-500 hover:text-white underline uppercase font-bold">Retake Photo</button>
            </div>

            <div class="gray-panel p-6 shadow-2xl flex flex-col">
                <h2 class="text-zinc-500 text-[10px] font-black uppercase mb-4 tracking-widest border-b border-zinc-800 pb-2">AI Output Preview</h2>
                <div class="flex-grow flex flex-col items-center justify-center bg-black/30 rounded-2xl p-4 border border-zinc-800/50">
                    <img id="result-image" class="hidden shadow-2xl" alt="AI Generated">
                    <div id="placeholder-text" class="text-zinc-700 text-xs font-mono uppercase text-center italic px-4">Waiting for execution...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PROXY_URL = "/api/generate";
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resultImage = document.getElementById('result-image');
        const placeholderText = document.getElementById('placeholder-text');
        const loader = document.getElementById('loader');
        const statusInfo = document.getElementById('status-info');

        let isFrozen = false, clothBase64 = "", clothMimeType = "";

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    render();
                };
            } catch (e) { statusInfo.innerText = "Camera Error: " + e.message; }
        }

        function render() {
            if (!isFrozen) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                requestAnimationFrame(render);
            }
        }

        document.getElementById('cloth-input').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            clothMimeType = file.type;
            document.getElementById('file-status').innerText = `${file.name}`;
            const reader = new FileReader();
            reader.onload = () => { clothBase64 = reader.result.split(',')[1]; };
            reader.readAsDataURL(file);
        };

        async function runAI() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value;
            if(!w || !h || !clothBase64) return alert("Bli, data fisik dan foto baju wajib diisi!");

            const selfieBase64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            
            // UI Feedback
            isFrozen = true;
            document.getElementById('freeze-overlay').classList.remove('hidden');
            loader.style.display = "block";
            placeholderText.innerText = "AI SEDANG MELUKIS POSE BERDIRI...";

            try {
                const payload = {
                    contents: [{
                        parts: [
                            { 
                                // PROMPT YANG JAUH LEBIH SPESIFIK & TEGAS
                                text: `ACT AS A PROFESSIONAL PHOTOGRAPHER. 
                                TARGET: Create a NEW image based on these inputs.
                                IMAGE 1: Reference for the person's face.
                                IMAGE 2: Reference for the clothes.
                                
                                MANDATORY RULES:
                                1. SHOT TYPE: Full Body Shot (Head to Toe).
                                2. POSE: The person MUST BE STANDING upright. No sitting, no leaning.
                                3. CLOTHING: Use the EXACT clothing design from Image 2.
                                4. BODY TYPE: Adjust body to ${w}kg and ${h}cm.
                                5. IDENTITY: The face must be EXACTLY like the person in Image 1.
                                6. OUTPUT: Return only the final generated image.` 
                            },
                            { inline_data: { mime_type: "image/jpeg", data: selfieBase64 } },
                            { inline_data: { mime_type: clothMimeType, data: clothBase64 } }
                        ]
                    }],
                    generationConfig: {
                        temperature: 1.0, // Menaikkan kreativitas agar AI mau merubah pose dari duduk ke berdiri
                    }
                };

                const res = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                // LOGIC KRUSIAL: Menangani perbedaan 'inlineData' vs 'inline_data'
                if (data.candidates && data.candidates[0].content.parts) {
                    let imagePart = data.candidates[0].content.parts.find(p => p.inlineData || p.inline_data);
                    
                    if (imagePart) {
                        const imgData = imagePart.inlineData || imagePart.inline_data;
                        resultImage.src = `data:${imgData.mimeType || imgData.mime_type};base64,${imgData.data}`;
                        resultImage.classList.remove('hidden');
                        placeholderText.classList.add('hidden');
                        statusInfo.innerText = "BERHASIL: FULL BODY GENERATED";
                    } else {
                        // Jika AI malah balas pakai teks (curhat), kita tampilkan di console
                        console.error("AI Response Text:", data.candidates[0].content.parts[0].text);
                        throw new Error("AI memberikan teks, bukan gambar. Coba ganti foto baju.");
                    }
                }
            } catch (err) {
                console.error(err);
                placeholderText.innerText = "ERROR: " + err.message;
            } finally {
                loader.style.display = "none";
            }
        }

        resetBtn.onclick = () => {
            isFrozen = false;
            document.getElementById('freeze-overlay').classList.add('hidden');
            resetBtn.classList.add('hidden');
            resultImage.classList.add('hidden');
            placeholderText.classList.remove('hidden');
            placeholderText.innerText = "Waiting for execution...";
            render();
        };

        captureBtn.onclick = runAI;
        init();
    </script>
</body>
</html>
