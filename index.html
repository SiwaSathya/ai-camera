<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fit v3.1 - Pure Deploy Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: #ececec; font-family: 'Inter', sans-serif; }
        .gray-panel { background-color: #1a1a1a; border: 1px solid #2a2a2a; }
        .input-field { background: #222; border: 1px solid #333; color: white; border-radius: 10px; padding: 10px; }
        #video-canvas, #result-image { border-radius: 16px; width: 100%; max-width: 480px; border: 1px solid #333; background: #000; }
        #video-canvas { transform: scaleX(-1); }
        .btn-primary { background: linear-gradient(145deg, #333, #222); border: 1px solid #444; transition: 0.3s; }
        .btn-primary:hover:not(:disabled) { background: #444; }
        .btn-primary:disabled { opacity: 0.5; }
        .loader { border: 2px solid #333; border-top: 2px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-6 md:p-10 flex flex-col items-center">

    <div class="max-w-6xl w-full">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-black tracking-tight text-white uppercase italic">Visual Transformer v3.1</h1>
            <p class="text-zinc-600 font-mono text-[10px] mt-2 tracking-wider">DEPLOY MODE: CORS BYPASS ENABLED</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="gray-panel p-6 rounded-2xl shadow-2xl space-y-5">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="weight" placeholder="Berat (kg)" class="input-field w-full outline-none">
                    <input type="number" id="height" placeholder="Tinggi (cm)" class="input-field w-full outline-none">
                </div>

                <div>
                    <input type="file" id="cloth-input" accept="image/*" class="hidden">
                    <button id="upload-btn" class="w-full py-2 bg-zinc-800 rounded-lg text-xs font-bold hover:bg-zinc-700 transition font-sans uppercase">
                        Upload Baju (Target)
                    </button>
                    <div id="file-status" class="text-[10px] text-center text-zinc-600 italic mt-2">No file selected</div>
                </div>

                <div class="relative">
                    <video id="webcam" autoplay playsinline class="hidden"></video>
                    <canvas id="video-canvas"></canvas>
                    <div id="freeze-overlay" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center rounded-2xl">
                        <span class="text-white font-bold text-xs tracking-widest border border-white p-2">CAPTURED</span>
                    </div>
                </div>

                <button id="capture-btn" class="btn-primary w-full py-3 rounded-2xl font-black text-white shadow-xl tracking-widest text-sm uppercase">GENERATE LOOK</button>
                <div class="flex flex-col items-center gap-2">
                    <div class="loader" id="loader"></div>
                    <div id="status-info" class="text-[10px] text-zinc-600 font-mono uppercase tracking-widest"></div>
                </div>
                <button id="reset-btn" class="hidden w-full text-[10px] text-zinc-500 hover:text-white transition underline uppercase font-bold mt-2">Retake Photo</button>
            </div>

            <div class="gray-panel p-6 rounded-2xl shadow-2xl flex flex-col">
                <h2 class="text-zinc-500 text-[10px] font-black uppercase mb-6 tracking-widest border-b border-zinc-800 pb-2">Output Preview</h2>
                <div id="image-container" class="w-full flex-grow flex flex-col items-center justify-center bg-black/50 rounded-2xl p-4 min-h-[350px]">
                    <img id="result-image" class="hidden" alt="AI Generated Output">
                    <div id="placeholder-text" class="text-zinc-700 text-xs italic">Waiting for process...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // TIDAK BUTUH API KEY DI FRONTEND
        // URL Fetch sekarang mengarah ke Proxy Internal Vercel
        const PROXY_URL = "/api/generate";

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('capture-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resultImage = document.getElementById('result-image');
        const placeholderText = document.getElementById('placeholder-text');
        const loader = document.getElementById('loader');
        const statusInfo = document.getElementById('status-info');

        let stream = null;
        let clothBase64 = "";
        let isFrozen = false;
        let animationId = null;

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    tick();
                };
            } catch (e) { statusInfo.innerText = "CAMERA ACCESS DENIED"; }
        }

        function tick() {
            if (!isFrozen) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                animationId = requestAnimationFrame(tick);
            }
        }

        // Fiks: Logika Pembacaan Gambar Baju
        document.getElementById('upload-btn').onclick = () => document.getElementById('cloth-input').click();

        document.getElementById('cloth-input').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-status').innerText = file.name;
            const reader = new FileReader();
            reader.onload = () => { clothBase64 = reader.result.split(',')[1]; };
            reader.readAsDataURL(file);
        };

        async function runAI() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value;

            if(!w || !h || !clothBase64) return alert("Mohon lengkapi data fisik dan upload gambar baju!");

            // 1. Ambil Selfie & Freeze
            const selfieBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            isFrozen = true;
            document.getElementById('freeze-overlay').classList.remove('hidden');
            resetBtn.classList.remove('hidden');

            loader.style.display = "block";
            captureBtn.disabled = true;
            placeholderText.innerText = "Generatingpixels... Mohon tunggu.";
            statusInfo.innerText = "Connecting to Proxy Server...";

            try {
                const payload = {
                    contents: [{
                        parts: [
                            { text: `System Message: Anda adalah AI Fashion Consultant profesional.
                                     Tugas: Ambil pakaian dari foto kedua dan pasangkan ke tubuh orang di foto pertama.
                                     Detail Fisik User: Berat ${w}kg, Tinggi ${h}cm.
                                     ATURAN KRUSIAL: Wajah dan identitas user di foto selfie (foto pertama) TIDAK BOLEH BERUBAH. Output harus berupa gambar baru.` },
                            { inline_data: { mime_type: "image/jpeg", data: selfieBase64 } },
                            { inline_data: { mime_type: "image/jpeg", data: clothBase64 } }
                        ]
                    }]
                };

                // 2. Fetch ke Endpoint Proxy Vercel
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // 3. Multi-layer Error Checking
                if (!data) throw new Error("Empty response dari server");
                if (data.error) throw new Error(data.error.message);
                if (!data.candidates || data.candidates.length === 0) throw new Error("Respons kosong. Kemungkinan terblokir filter keamanan Google.");

                const parts = data.candidates[0].content.parts;
                let foundImage = false;

                parts.forEach(part => {
                    if (part.inline_data) {
                        resultImage.src = `data:${part.inline_data.mime_type};base64,${part.inline_data.data}`;
                        resultImage.classList.remove('hidden');
                        placeholderText.classList.add('hidden');
                        foundImage = true;
                    }
                });

                if (!foundImage) throw new Error("AI memberikan teks tetapi gagal men-generate gambar.");

                statusInfo.innerText = "BERHASIL";

            } catch (err) {
                console.error("Fetch Error:", err);
                placeholderText.innerText = "Error: " + (err.message || "An unknown error occurred");
                statusInfo.innerText = "GAGAL";
            } finally {
                loader.style.display = "none";
                captureBtn.disabled = false;
            }
        }

        resetBtn.onclick = () => {
            isFrozen = false;
            document.getElementById('freeze-overlay').classList.add('hidden');
            resetBtn.classList.add('hidden');
            statusInfo.innerText = "";
            tick();
        };

        captureBtn.onclick = runAI;
        init();
    </script>
</body>
</html>
