<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Try-On - Single File Deploy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #d1d1d1; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gray-panel { background-color: #242424; border: 1px solid #333; }
        .input-field { background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 8px; padding: 10px; }
        #video-canvas { border-radius: 12px; background: #000; width: 100%; max-width: 450px; transform: scaleX(-1); border: 2px solid #3a3a3a; }
        .btn-primary { background-color: #4a4a4a; transition: 0.3s; }
        .btn-primary:hover { background-color: #5a5a5a; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .loader { border: 3px solid #333; border-top: 3px solid #999; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #cloth-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; border: 1px solid #444; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-5xl w-full">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-100 tracking-tight">AI Visual Transformer</h1>
            <p class="text-gray-500 text-sm">Deploy Ready: Pure Frontend Integration</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="gray-panel p-6 rounded-2xl shadow-2xl space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">1. Profil Fisik</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="weight" placeholder="Berat (kg)" class="input-field w-full outline-none focus:border-gray-500">
                        <input type="number" id="height" placeholder="Tinggi (cm)" class="input-field w-full outline-none focus:border-gray-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">2. Referensi Pakaian</label>
                    <input type="file" id="cloth-input" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('cloth-input').click()" class="w-full py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-sm hover:bg-zinc-700 transition">Upload Foto Baju</button>
                    <center><img id="cloth-preview"></center>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-2">3. Ambil Foto Wajah & Tubuh</label>
                    <video id="webcam" autoplay playsinline class="hidden"></video>
                    <canvas id="video-canvas"></canvas>
                </div>

                <button id="capture-btn" class="btn-primary w-full py-4 rounded-xl font-bold text-white shadow-lg tracking-widest uppercase text-sm">Proses Perubahan AI</button>
                
                <div class="flex flex-col items-center gap-2">
                    <div class="loader" id="loader"></div>
                    <div id="status-info" class="text-[10px] text-gray-500 font-mono"></div>
                </div>
            </div>

            <div class="gray-panel p-6 rounded-2xl shadow-2xl flex flex-col min-h-[400px]">
                <h2 class="text-gray-400 text-xs font-bold uppercase mb-4 tracking-widest border-b border-zinc-800 pb-2">Hasil Analisis Visual</h2>
                <div class="flex-grow overflow-y-auto bg-[#1e1e1e] rounded-xl p-5 border border-zinc-800">
                    <div id="ai-result-text" class="text-sm text-gray-400 leading-relaxed whitespace-pre-wrap italic">
                        Input data dan foto terlebih dahulu...
                    </div>
                </div>
                <p class="mt-4 text-[10px] text-gray-600 text-center">Identity Preservation System Active: Wajah tidak akan diubah.</p>
            </div>
        </div>
    </div>

    <script>
        /**
         * PENTING: Untuk deploy Vercel, pastikan API Key ini 
         * memiliki kuota yang cukup di Google AI Studio.
         */
        const API_KEY = "AIzaSyBL6s9TRBpKOyCJHgnAmis-dbCln_KABcw"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('video-canvas');
        const clothInput = document.getElementById('cloth-input');
        const clothPreview = document.getElementById('cloth-preview');
        const captureBtn = document.getElementById('capture-btn');
        const loader = document.getElementById('loader');
        const aiResultText = document.getElementById('ai-result-text');
        const statusInfo = document.getElementById('status-info');
        const ctx = canvas.getContext('2d');

        let clothBase64 = "";

        // Akses Kamera
        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    drawLoop();
                };
            } catch (e) {
                statusInfo.innerText = "Error Kamera: " + e.message;
            }
        }

        function drawLoop() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            requestAnimationFrame(drawLoop);
        }

        // Handle Upload Baju
        clothInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                clothBase64 = reader.result.split(',')[1];
                clothPreview.src = reader.result;
                clothPreview.style.display = "block";
            };
            reader.readAsDataURL(file);
        };

        async function processTransformation() {
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;

            if(!weight || !height || !clothBase64) {
                alert("Lengkapi data fisik dan foto baju!");
                return;
            }

            loader.style.display = "block";
            captureBtn.disabled = true;
            statusInfo.innerText = "MENGHUBUNGKAN KE GEMINI API...";
            aiResultText.innerText = "Sedang menganalisis wajah dan menyesuaikan pakaian...";

            try {
                // Ambil foto selfie saat tombol diklik
                const selfieBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                const payload = {
                    contents: [{
                        parts: [
                            { text: `CONTEXT: Virtual Try-On System. 
                            USER DATA: Weight ${weight}kg, Height ${height}cm.
                            INPUT: 
                            1. Selfie Image (Person)
                            2. Clothing Image (Target Item)
                            
                            TASK:
                            Modify the body shape of the person in the selfie to match the provided weight/height. 
                            Fit the clothing from the second image onto the modified body.
                            
                            STRICT RULES:
                            - FACE IDENTITY: 100% same as selfie. Do not modify facial features.
                            - CLOTHING: Must match the style and color of the clothing image.
                            - RESPONSE: Describe the transformation result in professional detail.` },
                            { inline_data: { mime_type: "image/jpeg", data: selfieBase64 } },
                            { inline_data: { mime_type: "image/jpeg", data: clothBase64 } }
                        ]
                    }]
                };

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error.message);

                if (data.candidates && data.candidates[0].content) {
                    const result = data.candidates[0].content.parts[0].text;
                    aiResultText.innerText = result;
                    aiResultText.classList.remove('italic');
                    statusInfo.innerText = "TRANSFORMASI BERHASIL";
                } else {
                    aiResultText.innerText = "AI gagal memproses gambar. Pastikan foto wajah terlihat jelas.";
                }

            } catch (err) {
                console.error(err);
                aiResultText.innerHTML = `<span class="text-red-500 font-mono text-xs">ERR: ${err.message}</span>`;
                statusInfo.innerText = "FAILED";
            } finally {
                loader.style.display = "none";
                captureBtn.disabled = false;
            }
        }

        captureBtn.onclick = processTransformation;
        startWebcam();
    </script>
</body>
</html>
